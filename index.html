<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bacheca Proof of Reality (PoR)</title>
    <style>
        body { 
            background: #070b19; 
            color: #38bdf8; 
            font-family: monospace; 
            text-align: center; 
            padding: 30px; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .bacheca-box { 
            border: 2px solid #38bdf8; 
            background: #0f172a; 
            padding: 30px; 
            border-radius: 16px; 
            max-width: 600px; 
            width: 100%;
            box-shadow: 0 0 35px rgba(56, 189, 248, 0.2); 
        }
        h2 { 
            color: #ffffff; 
            margin-top: 0; 
            margin-bottom: 10px; 
            font-size: 22px; 
            letter-spacing: 1px; 
        }
        .subtitle { 
            font-size: 12px; 
            color: #64748b; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
        }
        .card-notarizzazione { 
            background: rgba(56, 189, 248, 0.04); 
            border: 1px solid rgba(56, 189, 248, 0.15); 
            border-radius: 10px; 
            padding: 15px 20px; 
            text-align: left; 
            margin-bottom: 20px; 
            font-size: 11px; 
            color: #94a3b8; 
        }
        .timestamp { 
            border-bottom: 1px dashed rgba(148, 163, 184, 0.2); 
            padding-bottom: 6px; 
            margin-bottom: 8px; 
            color: #cbd5e1; 
        }
        .hash-t { 
            color: #38bdf8; 
            word-break: break-all; 
            font-family: monospace; 
            font-size: 12px; 
            margin-bottom: 12px; 
            background: rgba(2, 6, 23, 0.5);
            padding: 6px;
            border-radius: 4px;
            border-left: 3px solid #38bdf8;
        }
        .foto-preview {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #1e293b;
        }
        .meta-info { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(16, 185, 129, 0.05);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(16, 185, 129, 0.15);
        }
        .score-badge { 
            background: #10b981; 
            color: #ffffff; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 10px; 
            text-transform: uppercase; 
        }
        .tx-badge { 
            background: #1e293b; 
            color: #94a3b8; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 10px; 
            font-family: monospace;
            border: 1px solid #334155;
        }
        .btn-svuota { 
            background: #334155; 
            color: #cbd5e1; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-family: monospace; 
            font-size: 12px; 
            margin-top: 15px; 
            transition: background 0.2s; 
        }
        .btn-svuota:hover { background: #475569; color: #ffffff; }
        #emptyMsg { color: #475569; padding: 20px 0; font-style: italic; }
    </style>
</head>
<body>

    <div class="bacheca-box">
        <h2>Bacheca Proof of Reality (PoR)</h2>
        <div class="subtitle">Registro pubblico e inalterabile delle impronte digitali e multimediali</div>

        <div id="listaNotarizzazioni">
            <div id="emptyMsg">Caricamento registri in corso...</div>
        </div>

        <button class="btn-svuota" onclick="svuotaBacheca()">Svuota Registro Locale</button>
    </div>

    <script>
        const SUPABASE_URL = "https://fatnxlyqifpjkpsbhikz.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_FfOipl6nGeBFnLq8jxjvUA_KK26-G27";

        async function caricaRegistri() {
            try {
                // Interrogo il database ordinando per data di creazione discendente
                const response = await fetch(`${SUPABASE_URL}/rest/v1/notarizzazioni?select=*&order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (!response.ok) throw new Error("Errore nel recupero dei dati");

                const notarizzazioni = await response.json();
                const container = document.getElementById('listaNotarizzazioni');

                if (!notarizzazioni || notarizzazioni.length === 0) {
                    container.innerHTML = '<div id="emptyMsg">Nessuna impronta notarizzata in bacheca.</div>';
                    return;
                }

                // Mappatura dei record, inclusa la visualizzazione dell'immagine se l'URL è presente
                container.innerHTML = notarizzazioni.map(item => `
                    <div class="card-notarizzazione">
                        <div class="timestamp">${new Date(item.created_at).toLocaleString()}</div>
                        
                        ${item.foto_url ? `<img src="${item.foto_url}" class="foto-preview" alt="Foto Notarizzata">` : ''}
                        
                        <div class="hash-t">${item.hash}</div>
                        <div class="meta-info">
                            <div>Human Validation Score: <span class="score-badge">${item.human_score.toFixed(2)}</span></div>
                            <div>Pi Network TxID: <span class="tx-badge">${item.pi_txid || 'PENDING_PI_TRANSACTION'}</span></div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Errore:", err);
                document.getElementById('listaNotarizzazioni').innerHTML = 
                    '<div id="emptyMsg" style="color:#ef4444;">Impossibile caricare i dati dal database.</div>';
            }
        }

        function svuotaBacheca() {
            document.getElementById('listaNotarizzazioni').innerHTML = 
                '<div id="emptyMsg">Registro locale svuotato.</div>';
        }

        // Avvia il caricamento automatico all'apertura della pagina
        caricaRegistri();
    </script>
</body>
</html>
